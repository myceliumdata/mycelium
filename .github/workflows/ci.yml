# Non-blocking CI: reports pass/fail on PRs but is not a required merge check yet.
# See TODO.md — enable as required check in branch protection when ready.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build admin UI
        run: cd admin-ui && npm ci && npm run build

      - name: Ruff
        run: uv run ruff check src tests bin/

      - name: Smoke tests
        run: uv run pytest -m smoke -q