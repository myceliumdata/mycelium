  - id: bb-bio-research-01
    phase: bio_research
    description: primary_nickname Tavily research on miss
    skip_if_missing_env:
      - OPENAI_API_KEY
      - TAVILY_API_KEY
    step1:
      lookup:
        player: "{{ anchors.player }}"
      requested_attributes: [primary_nickname]
      provenance: true
    assert_step1:
      outcome: lookup_resolved
      delivery_present: true
    step2: true
    assert_step2:
      outcome: assembled
      path:
        results[0].primary_nickname:
          one_of: "{{ anchors.primary_nickname_accepted }}"

  - id: bb-m2-05
    phase: m2
    description: Cache hit repeat career_hr deliver
    step1:
      lookup:
        player: "{{ anchors.player }}"
      requested_attributes: [career_hr]
    assert_step1:
      outcome: lookup_resolved
      delivery_present: true
    step2: true
    assert_step2:
      outcome: assembled
      path:
