          equals: "{{ anchors.career_hr }}"

  - id: bb-m2-06
    phase: m2
    description: Unknown player not_found
    step1:
      lookup:
        player: XYZZY
    assert_step1:
      outcome: not_found

  - id: bb-derive-01
    phase: derive
    description: career_avg derive on full Lahman
    skip_if_missing_env:
      - OPENAI_API_KEY
      - MYCELIUM_COMPUTATION_CODEGEN_MODEL
    step1:
      lookup:
        player: "{{ anchors.player }}"
      requested_attributes: [career_avg]
      provenance: true
    assert_step1:
      outcome: lookup_resolved
      delivery_present: true
    step2: true
    assert_step2:
      outcome: assembled
      path:
        results[0].career_avg:
          approx: "{{ anchors.career_avg }}"
          tolerance: 0.001
    capture:
      provenance_timestamp: "provenance_timestamp:career_avg"

  - id: bb-derive-02
    phase: derive
    description: ops free-form derive on miss
    skip_if_missing_env:
      - OPENAI_API_KEY
      - MYCELIUM_COMPUTATION_CODEGEN_MODEL
    step1:
      lookup:
        player: "{{ anchors.player }}"
      requested_attributes: [ops]
    assert_step1:
      outcome: lookup_resolved
      delivery_present: true
    step2: true
    assert_step2:
      outcome: assembled
      path:
        results[0].ops:
          approx: "{{ anchors.ops }}"
          tolerance: 0.05

  - id: bb-derive-03
    phase: derive
    description: M4b synonym batting_average cache hit
    skip_if_missing_env:
      - OPENAI_API_KEY
      - MYCELIUM_INTENT_NORMALIZATION_MODEL
    depends_on: bb-derive-01
    step1:
      lookup:
        player: "{{ anchors.player }}"
      requested_attributes: [batting_average]
      provenance: true
    assert_step1:
      outcome: lookup_resolved
      delivery_present: true
    step2: true
    assert_step2:
      outcome: assembled
      path:
        results[0].batting_average:
          approx: "{{ anchors.career_avg }}"
          tolerance: 0.001
      same_timestamp_as: bb-derive-01
      intent_slug: career_batting_average

  - id: bb-derive-04
    phase: derive
    description: career_whip derive on miss (pitching domain)
    skip_if_missing_env:
      - OPENAI_API_KEY
