version: 1
scenarios:
  - id: bb-preflight-01
    phase: preflight
    description: Lahman warehouse sqlite present
    skip_query: true
    assert_step1:
      file_exists: warehouse/lahman.sqlite

  - id: bb-preflight-02
    phase: preflight
    description: Player registry populated
    skip_query: true
    assert_step1:
      registry_entity_count_gte: 1

  - id: bb-id-01
    phase: identity
    description: Hank Aaron partial lookup resolves
    step1:
      lookup:
        player: "{{ anchors.player }}"
    assert_step1:
      outcome: lookup_resolved
      total_matches_gte: 1
      results_empty: true
      delivery_present: true
    step2: true
    assert_step2:
      outcome: found
      path:
        results[0].player:
          truthy: true

  - id: bb-m2-01
    phase: m2
    description: career_hr and birth_date warehouse deliver
    step1:
      lookup:
        player: "{{ anchors.player }}"
      requested_attributes: [career_hr, birth_date]
      provenance: true
    assert_step1:
      outcome: lookup_resolved
      delivery_present: true
    step2: true
    assert_step2:
      outcome: assembled
      path:
        results[0].career_hr:
          equals: "{{ anchors.career_hr }}"
        results[0].birth_date:
          equals: "{{ anchors.birth_date }}"

  - id: bb-m2-02
    phase: m2
    description: career_rbi and career_hits anchors
    step1:
      lookup:
        player: "{{ anchors.player }}"
      requested_attributes: [career_rbi, career_hits]
    assert_step1:
      outcome: lookup_resolved
      delivery_present: true
    step2: true
    assert_step2:
      outcome: assembled
      path:
        results[0].career_rbi:
          equals: "{{ anchors.career_rbi }}"
        results[0].career_hits:
          equals: "{{ anchors.career_hits }}"

  - id: bb-m2-03
    phase: m2
    description: Six-attribute multi-specialist deliver
    step1:
      lookup:
        player: "{{ anchors.player }}"
      requested_attributes:
        - debut_team
        - debut_year
        - career_hr
        - career_rbi
        - career_hits
        - birth_date
      provenance: true
    assert_step1:
      outcome: lookup_resolved
      delivery_present: true
    step2: true
    assert_step2:
      outcome: assembled
      path:
        results[0].career_hr:
          equals: "{{ anchors.career_hr }}"
        results[0].birth_date:
          equals: "{{ anchors.birth_date }}"

  - id: bb-m2-04
    phase: m2
    description: Bio raw columns bats throws birth_city
    step1:
      lookup:
        player: "{{ anchors.player }}"
      requested_attributes: [bats, throws, birth_city]
    assert_step1:
      outcome: lookup_resolved
      delivery_present: true
    step2: true
    assert_step2:
      outcome: assembled
      path:
        results[0].bats:
          equals: "{{ anchors.bats }}"
        results[0].throws:
          equals: "{{ anchors.throws }}"
        results[0].birth_city:
          equals: "{{ anchors.birth_city }}"

